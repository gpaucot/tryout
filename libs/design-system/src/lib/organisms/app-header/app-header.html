<header
    class="flex h-16 items-center justify-between gap-4 border-b border-border bg-surface px-4 sm:px-6"
>
    <div class="flex min-w-0 items-center gap-3">
        <span
            class="grid size-8 shrink-0 place-items-center rounded-lg bg-brand-500 text-white md:hidden"
        >
            <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="size-4"
            >
                <path d="M4 11V8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3" />
                <path
                    d="M2 13a2 2 0 0 1 2-2 2 2 0 0 1 2 2v3h12v-3a2 2 0 0 1 4 0v5H2Z"
                />
                <path d="M5 18v2M19 18v2" />
            </svg>
        </span>

        <div class="min-w-0">
            <h1 class="truncate text-base font-semibold text-ink">
                <ng-content select="[title]">Dashboard</ng-content>
            </h1>
            <p class="hidden truncate text-xs text-ink-muted sm:block">
                <ng-content select="[subtitle]" />
            </p>
        </div>
    </div>

    <button ds-button size="sm" (click)="action.emit()">
        <ng-content select="[action-label]">Action</ng-content>
    </button>
</header>
